<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeList</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOGIN -->
    <section id="login-screen" class="screen active">
        <div class="noise"></div>
        <div class="login-box">
            <div class="login-tag">SISTEMA</div>
            <h1 class="login-title">ANIME<br><span>LIST</span></h1>
            <p class="login-sub">Acesse sua coleção pessoal</p>

            <div class="field">
                <label>USUÁRIO</label>
                <input type="text" id="username" placeholder="aluno" autocomplete="off">
            </div>
            <div class="field">
                <label>SENHA</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <p id="login-error" class="error"></p>

            <button onclick="login()" class="btn-enter">ENTRAR →</button>

            <div class="login-hint">
                <span>aluno</span> / <span>fiap2025</span>
            </div>
        </div>
    </section>

    <!-- APP -->
    <section id="app-screen" class="screen">
        <div class="noise"></div>
        <div class="app-wrap">

            <header class="app-header">
                <div class="header-left">
                    <div class="header-tag">COLEÇÃO</div>
                    <h2 class="header-title">MEUS ANIMES</h2>
                </div>
                <button onclick="logout()" class="btn-logout">SAIR ×</button>
            </header>

            <div class="add-area">
                <input type="text" id="anime-input" placeholder="Nome do anime...">
                <p id="anime-error" class="error"></p>
                <div class="add-buttons">
                    <button onclick="addToStart()" class="btn-add">+ INÍCIO</button>
                    <button onclick="addToEnd()" class="btn-add">+ FINAL</button>
                </div>
            </div>

            <div id="anime-list" class="anime-list"></div>

        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
